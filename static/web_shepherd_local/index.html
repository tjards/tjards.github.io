<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>webShepherd</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<canvas id="m-a_s"></canvas>

<script src="config.js"></script>
<script src="vector-math.js"></script>
<script src="agent.js"></script>
<script src="agent_herd.js"></script>
<script src="agent_shepherd.js"></script>
<script src="ui.js"></script>
<script>

// canvas setup
const canvas  = document.getElementById('m-a_s');
const ctx     = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// initialize agents
const centerX = canvas.width/2;
const centerY = canvas.height/2;

const herd = {
  members: [],
  color: COLORS.HERD,
  label: 'Herd'
};
herd.members = initializeHerd(INIT.HERD_SIZE, centerX, centerY, INIT.HERD_SPREAD_RADIUS);

const shepherds = {
  members: [],
  color: COLORS.SHEPHERD,
  label: 'Shepherds'
};
shepherds.members = initializeShepherds(INIT.SHEPHERD_SIZE, centerX, centerY, canvas.height);

// track population sizes for UI updates
let herdSize = INIT.HERD_SIZE;
let shepherdSize = INIT.SHEPHERD_SIZE;

// wrappers for dynamic UI controls
function addRandomHerdMember() {
  _addRandomHerdMember(herd.members, canvas.width, canvas.height);
}
function removeRandomHerdMember() {
  _removeRandomHerdMember(herd.members);
}
function addRandomShepherd() {
  _addRandomShepherd(shepherds.members, canvas.width, canvas.height);
}
function removeRandomShepherd() {
  _removeRandomShepherd(shepherds.members);
}

// start the app
initUI(canvas, ctx);

// apply dark/light theme to agent colors (keep herd reddish, adjust greys)
function applyTheme(dark) {
  if (dark) {
    COLORS.SHEPHERD          = 'rgba(180, 180, 180, 0.9)';
    COLORS.TARGET            = 'rgba(220, 220, 220, 0.8)';
  } else {
    COLORS.SHEPHERD          = 'rgba(70, 70, 70, 0.9)';
    COLORS.TARGET            = 'rgba(0, 0, 0, 0.8)';
  }
  shepherds.color = COLORS.SHEPHERD;
  document.body.classList.toggle('dark', dark);
}

// receive forwarded events from parent page (when embedded as iframe)
window.addEventListener('message', function(e) {
  if (!e.data || e.origin !== location.origin) return;
  if (e.data.type === 'mousemove') {
    prevMouseX = mouseX;
    prevMouseY = mouseY;
    mouseX = e.data.x;
    mouseY = e.data.y;
  } else if (e.data.type === 'click') {
    targetX = e.data.x;
    targetY = e.data.y;
  } else if (e.data.type === 'theme') {
    applyTheme(e.data.dark);
  }
});

</script>
</body>
</html>
